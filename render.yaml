services:
  - type: web
    name: tumelo-portfolio-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health/readiness
    autoDeploy: true

    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false

      - key: SPRING_DATA_MONGODB_DATABASE
        value: PortFolio

      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com

      - key: SPRING_MAIL_PORT
        value: "587"

      - key: SPRING_MAIL_USERNAME
        sync: false

      - key: SPRING_MAIL_PASSWORD
        sync: false

      - key: SPRING_MAIL_SMTP_AUTH
        value: "true"

      - key: SPRING_MAIL_STARTTLS_ENABLE
        value: "true"

      - key: SPRING_MAIL_STARTTLS_REQUIRED
        value: "true"

      - key: APP_MAIL_FROM
        sync: false

      - key: APP_MAIL_TO
        sync: false

      - key: APP_ADMIN_API_KEY
        generateValue: true

      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: APP_UPLOAD_MAX_BYTES
        value: "5242880"

      - key: MAX_FILE_SIZE
        value: 5MB

      - key: MAX_REQUEST_SIZE
        value: 5MB