spring.application.name=portfolio-api

server.address=0.0.0.0
server.port=${PORT:8080}
server.shutdown=graceful

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/portfolio}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:PortFolio}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:5MB}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false

app.admin-api-key=${APP_ADMIN_API_KEY:}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://tumelo-portfolio.vercel.app}
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
app.mail.to=${APP_MAIL_TO:}
app.upload.max-bytes=${APP_UPLOAD_MAX_BYTES:5242880}

logging.level.root=INFO
logging.level.org.springframework.web=INFO
