# =========================================================
# Application
# =========================================================

spring.application.name=portfolio-api


# =========================================================
# Web server
# Render supplies PORT automatically.
# =========================================================

server.address=0.0.0.0
server.port=${PORT:8080}
server.shutdown=graceful

spring.lifecycle.timeout-per-shutdown-phase=20s


# =========================================================
# MongoDB
# Spring Boot 4 uses spring.mongodb.*
#
# No localhost fallback is used. The application should fail
# clearly when the MongoDB environment variable is missing.
# =========================================================

spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:PortFolio}


# =========================================================
# Email
# =========================================================

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000


# =========================================================
# File uploads
# =========================================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:5MB}


# =========================================================
# Actuator and health checks
# =========================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

management.health.mongodb.enabled=false
management.health.mail.enabled=false



# =========================================================
# Application security
# Admin routes are disabled when APP_ADMIN_API_KEY is empty.
# =========================================================

app.admin-api-key=${APP_ADMIN_API_KEY:}


# =========================================================
# CORS
# Multiple origins must be comma-separated.
# =========================================================

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://tumelo-portfolio.vercel.app}


# =========================================================
# Contact form email routing
# =========================================================

app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
app.mail.to=${APP_MAIL_TO:}


# =========================================================
# Upload restrictions
# 5,242,880 bytes = 5 MB
# =========================================================

app.upload.max-bytes=${APP_UPLOAD_MAX_BYTES:5242880}


# =========================================================
# Logging
# =========================================================

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.mongodb.driver=INFO